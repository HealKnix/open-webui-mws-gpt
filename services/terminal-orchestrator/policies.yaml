policies:
  - id: default
    description: 'Baseline hardened shell; no outbound internet.'
    image: ghcr.io/open-webui/open-terminal:latest
    port: 8000
    mem_limit: 1g
    cpu_limit: 1.0
    pids_limit: 256
    allow_internet: false

  - id: heavy
    description: 'Data-science profile with 4 GiB / 2 CPUs.'
    image: ghcr.io/open-webui/open-terminal:latest
    port: 8000
    mem_limit: 4g
    cpu_limit: 2.0
    pids_limit: 512
    allow_internet: false

  - id: internet
    description: 'Allows outbound network via the egress bridge.'
    image: ghcr.io/open-webui/open-terminal:latest
    port: 8000
    mem_limit: 1g
    cpu_limit: 1.0
    pids_limit: 256
    allow_internet: true
